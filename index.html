<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro</title>
    
    <!-- Material UI CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mui/material@5.14.0/dist/mui.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <!-- reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <!-- CSS customizado -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <section class="form-section">
            <div class="form-container">
                <header class="form-header">
                    <h1>Criar Conta</h1>
                    <p>Preencha os dados abaixo para se cadastrar</p>
                </header>

                <form id="cadastroForm" class="form" novalidate>
                    <!-- Nome -->
                    <div class="form-group">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input 
                            type="text" 
                            id="nome" 
                            name="nome" 
                            class="form-input" 
                            placeholder="João Silva"
                            required
                            minlength="3"
                        >
                        <span class="error-message" id="nomeError"></span>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input" 
                            placeholder="seu.email@exemplo.com"
                            required
                        >
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <!-- Telefone -->
                    <div class="form-group">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input 
                            type="tel" 
                            id="telefone" 
                            name="telefone" 
                            class="form-input" 
                            placeholder="(11) 99999-9999"
                            required
                            pattern="(\(?\d{2}\)?\s?)?\d{4,5}-?\d{4}"
                        >
                        <span class="error-message" id="telefoneError"></span>
                    </div>

                    <!-- Senha -->
                    <div class="form-group">
                        <label for="senha" class="form-label">Senha</label>
                        <input 
                            type="password" 
                            id="senha" 
                            name="senha" 
                            class="form-input" 
                            placeholder="Mínimo 8 caracteres"
                            required
                            minlength="8"
                        >
                        <span class="error-message" id="senhaError"></span>
                    </div>

                    <!-- Confirmação de Senha -->
                    <div class="form-group">
                        <label for="confirmaSenha" class="form-label">Confirmar Senha</label>
                        <input 
                            type="password" 
                            id="confirmaSenha" 
                            name="confirmaSenha" 
                            class="form-input" 
                            placeholder="Repita a senha"
                            required
                            minlength="8"
                        >
                        <span class="error-message" id="confirmaSenhaError"></span>
                    </div>

                    <!-- Termos -->
                    <div class="form-group checkbox-group">
                        <input 
                            type="checkbox" 
                            id="termos" 
                            name="termos" 
                            required
                        >
                        <label for="termos" class="checkbox-label">
                            Concordo com os <a href="#" class="link">Termos de Serviço</a> e 
                            <a href="#" class="link">Política de Privacidade</a>
                        </label>
                        <span class="error-message" id="termosError"></span>
                    </div>

                    <!-- reCAPTCHA -->
                    <div class="form-group recaptcha-container">
                        <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"></div>
                        <span class="error-message" id="recaptchaError"></span>
                    </div>

                    <!-- Botão Submit -->
                    <button type="submit" class="btn-submit">
                        <span class="btn-text">Criar Conta</span>
                    </button>

                    <!-- Link para login -->
                    <p class="login-link">
                        Já tem conta? <a href="#" class="link">Faça login aqui</a>
                    </p>
                </form>

                <!-- Mensagem de sucesso -->
                <div id="successMessage" class="success-message" style="display: none;">
                    <span class="success-icon">✓</span>
                    <h2>Cadastro realizado com sucesso!</h2>
                    <p>Você será redirecionado em breve...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <!-- Firebase SDK (defer para não bloquear) -->
    <script defer src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    
    <!-- Configuração e lógica -->
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
