<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <!-- Material UI CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mui/material@5.14.0/dist/mui.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    
    <!-- CSS customizado -->
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-form {
            max-width: 400px;
        }
    </style>
</head>
<body>
    <main class="container">
        <section class="form-section">
            <div class="form-container login-form">
                <header class="form-header">
                    <h1>Entrar</h1>
                    <p>Acesse sua conta</p>
                </header>

                <form id="loginForm" class="form" novalidate>
                    <!-- Email -->
                    <div class="form-group">
                        <label for="loginEmail" class="form-label">Email</label>
                        <input 
                            type="email" 
                            id="loginEmail" 
                            name="email" 
                            class="form-input" 
                            placeholder="seu.email@exemplo.com"
                            required
                        >
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <!-- Senha -->
                    <div class="form-group">
                        <label for="loginSenha" class="form-label">Senha</label>
                        <input 
                            type="password" 
                            id="loginSenha" 
                            name="senha" 
                            class="form-input" 
                            placeholder="Sua senha"
                            required
                            minlength="8"
                        >
                        <span class="error-message" id="senhaError"></span>
                    </div>

                    <!-- Botão Submit -->
                    <button type="submit" class="btn-submit">
                        <span class="btn-text">Entrar</span>
                    </button>

                    <!-- Links -->
                    <p class="login-link">
                        Não tem conta? <a href="index.html" class="link">Cadastre-se aqui</a>
                    </p>
                    <p class="login-link">
                        Esqueceu sua senha? <a href="#" class="link" id="resetarSenhaLink">Recuperar senha</a>
                    </p>
                </form>

                <!-- Mensagem de Sucesso -->
                <div id="successMessage" class="success-message" style="display: none;">
                    <span class="success-icon">✓</span>
                    <h2>Login realizado!</h2>
                    <p>Redirecionando...</p>
                </div>

                <!-- Mensagem de Reset de Senha -->
                <div id="resetMessage" class="success-message" style="display: none;">
                    <span class="success-icon">✉️</span>
                    <h2>Email enviado!</h2>
                    <p>Verifique sua caixa de entrada para resetar a senha.</p>
                    <button class="btn-submit" onclick="voltarParaLogin()" style="margin-top: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        Voltar para Login
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="firebase-config.js"></script>
    <script src="script-login.js"></script>
</body>
</html>
